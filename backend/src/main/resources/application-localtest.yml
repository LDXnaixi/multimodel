server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/multimodal_localtest;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  model-runner:
    timeout-ms: ${APP_MODEL_RUNNER_TIMEOUT_MS:30000}
